baseURL = 'https://cct39.github.io/CctMikuBlog.github.io/'
locale = 'zh-tw'
title = 'CCT的咪苦筆記'
theme = "PaperMod"
enableGitInfo = true
googleAnalytics = "G-KEPTVXG0L7" # CctMikuBlog

hasCJKLanguage = true
summaryLength = 40

defaultContentLanguage = "zh-tw"
defaultContentLanguageInSubdir = false

[params]
    math = true
    mermaid = true
    author = "CCT"
    defaultTheme = "auto"
    displayRSSButton = true 
    ShowThemeBadge = false
    themeColor = "#39c5bb"
    # 在網頁 Footer 顯示創用 CC 版權宣告
    copyright = "本站圖文內容除另有標示外，均採用 [CC BY-NC-ND 4.0](https://creativecommons.org/licenses/by-nc-nd/4.0/deed.zh_TW) 授權條款。"

# === 打賞與聯盟行銷設定（待啟用）===
