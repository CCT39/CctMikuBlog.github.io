name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - master        # 每次推送到 master 分支時觸發
  workflow_dispatch:  # 也可以手動觸發

# 允許 Actions 寫入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只允許一個部署，不取消進行中的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # 抓取 PaperMod 主題 submodule
          fetch-depth: 0          # 取得完整歷史（enableGitInfo 需要）

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true          # 使用 Hugo Extended（支援 SCSS）

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
